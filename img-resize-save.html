<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            z-index: 1001;
            background: #1a1a1a;
        }

        #viewport {
            flex-grow: 1;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Обрезаем всё, что за пределами вьюпорта */
            background: #333;
            position: relative;
        }

        #workspace {
            position: absolute;
            background: #fff;
            transform-origin: center center;
            display: none;
            overflow: hidden;
            /* КЛЮЧЕВОЕ: картинки не вылезут за границы полотна */
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .img-wrapper {
            position: absolute;
            cursor: move;
            line-height: 0;
            touch-action: none;
        }

        .img-wrapper.active {
            outline: 4px dashed #007bff;
            z-index: 999;
        }

        .img-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            pointer-events: none;
        }

        .layer-menu {
            position: absolute;
            top: -60px;
            left: 0;
            display: none;
            gap: 10px;
        }

        .img-wrapper.active .layer-menu {
            display: flex;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        .btn-ui {
            background: #555;
            color: white;
        }

        .btn-del {
            background: #ff4d4d;
            color: white;
        }

        #saveBtn {
            background: #29bd67;
            color: white;
            flex-grow: 1;
            display: none;
            width: fit-content;
            /* Кнопка подстраивается под содержимое */
            display: inline-block;
        }

        .btn-download {
            border: 0;
        }

        .resizer {
            width: 44px;
            height: 44px;
            background: #007bff;
            position: absolute;
            right: -22px;
            bottom: -22px;
            border-radius: 50%;
            border: 4px solid #fff;
            display: none;
            z-index: 1001;
        }

        .hidden {
            display: none !important;
        }

        .img-wrapper.active .resizer {
            display: block;
        }
    </style>
</head>

<body>

    <div class="controls">
        <input type="file" id="loader" accept="image/*" multiple>
        <button id="saveBtn" class="btn-download hidden">Скачать</button>
    </div>

    <div id="viewport">
        <div id="workspace"></div>
    </div>

    <script>
        const loader = document.getElementById('loader');
        const workspace = document.getElementById('workspace');
        const saveBtn = document.getElementById('saveBtn');
        const viewport = document.getElementById('viewport');

        let canvasW = 0, canvasH = 0;
        let activeElement = null;
        let currentScale = 1;

        loader.onchange = async (e) => {
            const files = Array.from(e.target.files).slice(0, 2);
            if (!files.length) return;
            workspace.innerHTML = '';
            canvasW = 0; canvasH = 0;

            document.getElementById('viewport').classList.remove('hidden');
            saveBtn.classList.remove('hidden');

            const images = await Promise.all(files.map(file => {
                return new Promise(resolve => {
                    const img = new Image();
                    img.src = URL.createObjectURL(file);
                    img.onload = () => resolve(img);
                });
            }));

            images.forEach(img => {
                if (img.naturalWidth > canvasW) canvasW = img.naturalWidth;
                if (img.naturalHeight > canvasH) canvasH = img.naturalHeight;
            });

            initWorkspace(images);
        };

        function initWorkspace(images) {
            workspace.style.width = canvasW + 'px';
            workspace.style.height = canvasH + 'px';
            workspace.style.display = 'block';
            saveBtn.style.display = 'block';

            updateScale();

            images.forEach((img, i) => {
                const wrap = document.createElement('div');
                wrap.className = 'img-wrapper';
                wrap.style.zIndex = i + 1;
                wrap.style.width = (canvasW * 0.5) + 'px';
                wrap.style.left = '0px';
                wrap.style.top = '0px';

                wrap.innerHTML = `
                    <div class="layer-menu">
                        <button class="btn btn-ui up">↑</button>
                        <button class="btn btn-ui down">↓</button>
                        <button class="btn btn-del">✕</button>
                    </div>
                    <div class="resizer"></div>
                `;
                wrap.appendChild(img);
                workspace.appendChild(wrap);

                wrap.querySelector('.up').onclick = () => wrap.style.zIndex = parseInt(wrap.style.zIndex) + 1;
                wrap.querySelector('.down').onclick = () => wrap.style.zIndex = Math.max(1, parseInt(wrap.style.zIndex) - 1);
                wrap.querySelector('.btn-del').onclick = () => wrap.remove();

                setupEvents(wrap);
            });
        }

        function updateScale() {
            if (canvasW === 0) return;
            const vW = viewport.clientWidth - 50;
            const vH = viewport.clientHeight - 50;
            currentScale = Math.min(vW / canvasW, vH / canvasH);

            workspace.style.transform = `translate(-50%, -50%) scale(${currentScale})`;
            workspace.style.left = '50%';
            workspace.style.top = '50%';
        }

        window.onresize = updateScale;

        function setupEvents(el) {
            const resizer = el.querySelector('.resizer');
            const getPos = (e) => {
                const t = e.touches ? e.touches[0] : e;
                return { x: t.clientX, y: t.clientY };
            };

            const startMove = (e) => {
                if (e.target.tagName === 'BUTTON' || e.target.classList.contains('resizer')) return;
                if (activeElement) activeElement.classList.remove('active');
                activeElement = el;
                el.classList.add('active');

                const start = getPos(e);
                const startX = el.offsetLeft;
                const startY = el.offsetTop;

                const onMove = (me) => {
                    const p = getPos(me);
                    el.style.left = startX + (p.x - start.x) / currentScale + 'px';
                    el.style.top = startY + (p.y - start.y) / currentScale + 'px';
                };

                const onEnd = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchmove', onMove);
                };

                document.addEventListener('mousemove', onMove);
                document.addEventListener('touchmove', onMove, { passive: false });
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchend', onEnd);
            };

            el.addEventListener('mousedown', startMove);
            el.addEventListener('touchstart', startMove, { passive: false });

            const startResize = (e) => {
                e.stopPropagation(); e.preventDefault();
                const start = getPos(e);
                const startW = el.offsetWidth;

                const onResize = (me) => {
                    const p = getPos(me);
                    const newW = startW + (p.x - start.x) / currentScale;
                    if (newW > 50) el.style.width = newW + 'px';
                };

                const onEnd = () => {
                    document.removeEventListener('mousemove', onResize);
                    document.removeEventListener('touchmove', onResize);
                };

                document.addEventListener('mousemove', onResize);
                document.addEventListener('touchmove', onResize, { passive: false });
                document.addEventListener('mouseup', onEnd);
                document.addEventListener('touchend', onEnd);
            };

            resizer.addEventListener('mousedown', startResize);
            resizer.addEventListener('touchstart', startResize, { passive: false });
        }

        saveBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = canvasW; canvas.height = canvasH;
            const ctx = canvas.getContext('2d');
            const layers = Array.from(workspace.querySelectorAll('.img-wrapper'))
                .sort((a, b) => parseInt(a.style.zIndex) - parseInt(b.style.zIndex));

            layers.forEach(l => {
                const img = l.querySelector('img');
                ctx.drawImage(img, parseFloat(l.style.left), parseFloat(l.style.top), l.offsetWidth, l.offsetHeight);
            });
            const a = document.createElement('a');
            a.download = 'result.png';
            a.href = canvas.toDataURL('image/png');
            a.click();
        };
    </script>
</body>

</html>
