<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 15px; touch-action: manipulation; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        
        #workspace {
            position: relative;
            background: #fff;
            border: 2px solid #333;
            margin: 0 auto;
            overflow: hidden;
            display: none;
            max-width: 100%; /* Адаптивность под экран */
            touch-action: none; /* Отключаем системный скролл внутри поля */
        }

        .img-wrapper {
            position: absolute;
            cursor: move;
            line-height: 0;
            user-select: none;
            touch-action: none;
        }

        .img-wrapper.active { outline: 2px dashed #007bff; }

        .img-wrapper img { width: 100%; height: auto; display: block; pointer-events: none; }

        /* Увеличенные маркеры для пальцев */
        .resizer {
            width: 24px;
            height: 24px;
            background: #007bff;
            position: absolute;
            right: -12px;
            bottom: -12px;
            cursor: nwse-resize;
            border-radius: 50%;
            display: none;
            border: 3px solid white;
            z-index: 100;
        }

        .img-wrapper.active .resizer { display: block; }

        /* Кнопки управления слоями */
        .layer-controls {
            position: absolute;
            top: -45px;
            left: 0;
            display: none;
            gap: 8px;
        }
        .img-wrapper.active .layer-controls { display: flex; }
        .layer-controls button {
            padding: 8px 12px;
            font-size: 14px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
        }

        #saveBtn { background: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 5px; font-weight: bold; }
        input[type="file"] { max-width: 200px; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="file" id="loader" accept="image/*" multiple>
        <button id="saveBtn" style="display:none;">Скачать PNG</button>
    </div>

    <div id="workspace"></div>

    <script>
        const loader = document.getElementById('loader');
        const workspace = document.getElementById('workspace');
        const saveBtn = document.getElementById('saveBtn');
        let maxWidth = 0, maxHeight = 0;
        let activeElement = null;

        loader.onchange = (e) => {
            const files = Array.from(e.target.files).slice(0, 2);
            workspace.innerHTML = '';
            maxWidth = 0; maxHeight = 0;
            
            files.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        if (img.naturalWidth > maxWidth) maxWidth = img.naturalWidth;
                        if (img.naturalHeight > maxHeight) maxHeight = img.naturalHeight;
                        
                        workspace.style.width = maxWidth + 'px';
                        workspace.style.height = maxHeight + 'px';
                        workspace.style.display = 'block';
                        saveBtn.style.display = 'block';

                        createWrapper(img, index);
                    };
                };
                reader.readAsDataURL(file);
            });
        };

        function createWrapper(img, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'img-wrapper';
            wrapper.style.zIndex = index + 1;
            wrapper.style.left = '20px';
            wrapper.style.top = '50px';
            wrapper.style.width = '150px'; // Начальный размер для мобильных

            wrapper.innerHTML = `
                <div class="layer-controls">
                    <button class="layer-up">↑ Слой</button>
                    <button class="layer-down">↓ Слой</button>
                </div>
                <div class="resizer"></div>
            `;
            wrapper.appendChild(img);
            workspace.appendChild(wrapper);

            // Обработчики кнопок слоев
            wrapper.querySelector('.layer-up').onclick = () => wrapper.style.zIndex = parseInt(wrapper.style.zIndex) + 1;
            wrapper.querySelector('.layer-down').onclick = () => wrapper.style.zIndex = Math.max(1, parseInt(wrapper.style.zIndex) - 1);

            initInteractions(wrapper);
        }

        function initInteractions(el) {
            const resizer = el.querySelector('.resizer');

            // Универсальная функция для Drag (Mouse + Touch)
            const startDrag = (e) => {
                if (e.target.tagName === 'BUTTON') return;
                
                if (activeElement) activeElement.classList.remove('active');
                activeElement = el;
                el.classList.add('active');

                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;

                let startX = clientX - el.offsetLeft;
                let startY = clientY - el.offsetTop;

                const move = (moveEv) => {
                    const moveX = moveEv.type.includes('touch') ? moveEv.touches[0].clientX : moveEv.clientX;
                    const moveY = moveEv.type.includes('touch') ? moveEv.touches[0].clientY : moveEv.clientY;
                    el.style.left = (moveX - startX) + 'px';
                    el.style.top = (moveY - startY) + 'px';
                };

                const stop = () => {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('touchmove', move);
                };

                document.addEventListener('mousemove', move);
                document.addEventListener('touchmove', move, { passive: false });
                document.addEventListener('mouseup', stop);
                document.addEventListener('touchend', stop);
            };

            el.addEventListener('mousedown', startDrag);
            el.addEventListener('touchstart', startDrag, { passive: false });

            // Универсальная функция для Resize
            const startResize = (e) => {
                e.stopPropagation();
                e.preventDefault();
                
                const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                let startX = clientX;
                let startWidth = el.offsetWidth;

                const move = (moveEv) => {
                    const moveX = moveEv.type.includes('touch') ? moveEv.touches[0].clientX : moveEv.clientX;
                    let newWidth = startWidth + (moveX - startX);
                    if (newWidth > 50) el.style.width = newWidth + 'px';
                };

                const stop = () => {
                    document.removeEventListener('mousemove', move);
                    document.removeEventListener('touchmove', move);
                };

                document.addEventListener('mousemove', move);
                document.addEventListener('touchmove', move, { passive: false });
                document.addEventListener('mouseup', stop);
                document.addEventListener('touchend', stop);
            };

            resizer.addEventListener('mousedown', startResize);
            resizer.addEventListener('touchstart', startResize, { passive: false });
        }

        saveBtn.onclick = () => {
            const canvas = document.createElement('canvas');
            canvas.width = maxWidth;
            canvas.height = maxHeight;
            const ctx = canvas.getContext('2d');

            const wrappers = Array.from(workspace.querySelectorAll('.img-wrapper'))
                .sort((a, b) => parseInt(a.style.zIndex) - parseInt(b.style.zIndex));

            wrappers.forEach(wrap => {
                const img = wrap.querySelector('img');
                ctx.drawImage(img, 
                    parseFloat(wrap.style.left), 
                    parseFloat(wrap.style.top), 
                    wrap.offsetWidth, 
                    wrap.offsetHeight
                );
            });

            const link = document.createElement('a');
            link.download = 'ready-photo.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
